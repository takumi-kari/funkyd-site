}

/* 見出し */
h1, h2 {
  font-weight: bold;

.section {
  background: white;

}

  background: white;
  border-bottom: 1px solid #eee;
}
nav a {
  color: #333;
  font-weight: bold;
}
nav a:hover {
  color: #ff7a7a;
}

/* ボタン強化 */
.btn {
  background: linear-gradient(135deg, #ff7a7a, #ffb6b9);
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* カード（料金とか） */
.card {
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
}
